stages:
  - release
  - deploy

create_tag:
  image: node:latest
  stage: release
  script:
    - npx semantic-release
  rules:
    - if: '$CI_COMMIT_TAG'
      when: never
    - when: always

create_image:
  image: docker:cli
  stage: deploy
  services:
    - docker:dind
  variables:
    DOCKER_IMAGE: $DOCKER_USER/$DOCKER_IMAGE_NAME:$CI_COMMIT_TAG
  script:
    - echo "$DOCKER_TOKEN" | docker login -u $DOCKER_USER --password-stdin
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  rules:
    - if: '$CI_COMMIT_TAG'
